<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login Admin</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f5f5f5;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:100%;
            max-width:420px;
            background:white;
            padding:40px;
            border-radius:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .title h2{
            font-weight:700;
            color:#2F5D50;
        }

        .form-control{
            height:50px;
            border-radius:15px;
        }

        .btn-login{
            width:100%;
            height:50px;
            border:none;
            border-radius:15px;
            background:#2F5D50;
            color:white;
            font-weight:600;
            margin-top:10px;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#24473d;
        }

        .error{
            background:#ffdddd;
            color:red;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            text-align:center;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="title">

            <h2>Login Admin</h2>

            <p>
                Sistem Absensi Guru QR Code
            </p>

        </div>

        <div class="error">
            {{error}}
        </div>

        <form action="/login" method="POST">

            <div class="mb-3">

                <label>Username</label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Masukkan Username"
                       required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Masukkan Password"
                       required>

            </div>

            <button type="submit"
                    class="btn-login">

                Login

            </button>

        </form>

    </div>

</body>
</html>
