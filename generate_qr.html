<!DOCTYPE html>
<html lang="id">
<head>

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
}

.sidebar{
    width:260px;
    height:100vh;
    background:#2F5D50;
    position:fixed;

    padding:15px;
    border-radius:15px;

.menu a:hover{
    background:rgba(255,255,255,0.2);
}

    background:rgba(255,255,255,0.2);
}

.main{
    margin-left:280px;
    padding:30px;
}

.box{
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.table th{
    background:#2F5D50;
    color:white;
}

.qr-img{
    width:100px;
}

.btn-generate{
    background:#2F5D50;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:10px;
}

.btn-download{
    background:#0d6efd;
